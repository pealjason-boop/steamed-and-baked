<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | SteamedAndBaked</title>
    <link rel="stylesheet" href="/css/cyberpunk.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo"><img src="/images/logo-main.png" alt="Steamed and Baked" class="logo-img"></a>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <div style="font-size: 8rem; color: var(--neon-cyan); text-shadow: var(--glow-cyan); margin-bottom: var(--space-6);">
                404
            </div>
            <h1 class="glitch" data-text="PAGE NOT FOUND" style="font-size: var(--text-4xl);">PAGE NOT FOUND</h1>
            <p class="hero-subtitle">
                The page you're looking for doesn't exist in this reality.<br>
                Perhaps it's in another dimension?
            </p>
            <div style="display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap; margin-top: var(--space-8);">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-home"></i> Return Home
                </a>
                <a href="/fiction.html" class="btn btn-secondary">
                    <i class="fas fa-book"></i> Browse Content
                </a>
            </div>
        </div>
    </section>

    <script src="/js/main.js"></script>
</body>
</html>
