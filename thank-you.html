<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Steamed and Baked</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/">
                    <img src="/images/logo.svg" alt="Steamed and Baked Logo" class="logo">
                </a>
            </div>
        </div>
    </nav>

    <section class="hero" style="min-height: 80vh; display: flex; align-items: center;">
        <div class="container" style="text-align: center;">
            <div style="font-size: 5rem; color: white; margin-bottom: 2rem;">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1 class="hero-title">Thank You!</h1>
            <p class="hero-subtitle">We've received your message and will get back to you soon.</p>
            <div class="hero-cta" style="margin-top: 3rem;">
                <a href="/" class="btn btn-primary btn-large">Return Home</a>
                <a href="/contact.html" class="btn btn-secondary btn-large">Send Another Message</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                <p>&copy; <span id="current-year"></span> Steamed and Baked. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>
</html>
